<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9 col-md-10">

            <div class="card shadow border-0">

                <div class="card-header bg-primary text-white py-4">

                    <h2 class="mb-1">
                        ✍️ Create New Blog
                    </h2>

                    <p class="mb-0">
                        Share your thoughts, experiences and ideas with everyone.
                    </p>

                </div>

                <div class="card-body p-5">

                    <form (ngSubmit)="createBlog()">

                        <!-- Blog Title -->
                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Blog Title
                            </label>

                            <input type="text" class="form-control form-control-lg" name="title" [(ngModel)]="title"
                                placeholder="Enter your blog title" required>

                        </div>

                        <!-- Blog Content -->
                        <div class="mb-4">

                            <label class="form-label fw-bold">
                                Blog Content
                            </label>

                            <textarea class="form-control" rows="12" name="content" [(ngModel)]="content"
                                placeholder="Write your blog content here..." required>
                            </textarea>

                        </div>

                        <!-- Buttons -->
                        <div class="d-flex justify-content-end gap-3">

                            <button type="reset" class="btn btn-outline-secondary px-4">
                                Clear
                            </button>

                            <button type="submit" class="btn btn-primary px-5">
                                Publish Blog
                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>
