<section class="edit-blog">
    <div class="container py-4">
        <h2>Edit Blog</h2>

        @if (isLoading) {
        <p>Loading blog...</p>
        } @else {
        <form #blogForm="ngForm" (ngSubmit)="updateBlog()" novalidate>
            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text" class="form-control" [(ngModel)]="title" name="title" #titleInput="ngModel" required
                    minlength="5" maxlength="100" />
                @if (titleInput.invalid && (titleInput.touched || blogForm.submitted)) {
                <div class="text-danger small mt-1">Title must be at least 5 characters.</div>
                }
            </div>

            <div class="mb-3">
                <label class="form-label">Content</label>
                <textarea class="form-control" rows="8" [(ngModel)]="content" name="content" #contentInput="ngModel"
                    required minlength="20"></textarea>
                @if (contentInput.invalid && (contentInput.touched || blogForm.submitted)) {
                <div class="text-danger small mt-1">Content must be at least 20 characters.</div>
                }
            </div>

            <button type="submit" class="btn btn-primary">Update Blog</button>
            <a routerLink="/my-blogs" class="btn btn-secondary ms-2">Cancel</a>
        </form>
        }
    </div>
</section>
