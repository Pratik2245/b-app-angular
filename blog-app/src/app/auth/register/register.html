<div class="auth-shell">
    <div class="auth-panel auth-visual">
        <div class="brand-badge">B</div>
        <h2>Join BlogSphere</h2>
        <p>Create your account and begin sharing your thoughts with a wider audience.</p>
        <ul class="feature-list">
            <li>Start your personal blog quickly</li>
            <li>Engage with readers instantly</li>
            <li>Manage everything from one place</li>
        </ul>
    </div>

    <div class="auth-panel auth-form-panel">
        <div class="form-header">
            <h1>Create account</h1>
            <p>Register to start publishing and connecting.</p>
        </div>

        <form class="auth-form" (ngSubmit)="register()">
            <div class="form-group">
                <label for="username">Username</label>
                <input id="username" type="text" class="custom-input" name="username" [(ngModel)]="username"
                    placeholder="Enter username" />
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input id="email" type="email" class="custom-input" name="email" [(ngModel)]="email"
                    placeholder="Enter email" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input id="password" type="password" name="password" [(ngModel)]="password" class="custom-input"
                    placeholder="Create password" />
            </div>

            <button class="register-btn" type="submit">Create Account</button>
        </form>

        <p class="switch-text">
            Already have an account?
            <a routerLink="/login">Login</a>
        </p>
    </div>
</div>
